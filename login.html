<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Авторизация · Метеопортал</title>
    <style type="text/css">
        /* === СБРОС И БАЗА === */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: 'Segoe UI', 'Verdana', sans-serif;
            font-size: 11px;
        }
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        #bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding-top: 10%;
        }
        table {
            border-collapse: collapse;
        }
        /* === ОСНОВНАЯ ТАБЛИЦА ЛОГИНА (ФОН КАК У POPUP) === */
        .login-table {
            margin: 0 auto;
            background: #cfddee; /* фон как у dxeCalendar */
            border: 1px solid #8ba0bc;
            padding: 20px 25px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            color: #1e395b;
            border-spacing: 0;
            width: auto;
        }
        .login-table td {
            padding: 6px 4px;
            vertical-align: middle;
        }
        /* Заголовок */
        .header-text {
            font-family: 'Verdana', sans-serif;
            font-size: 18px;
            font-weight: normal;
            color: #1e395b;
            text-align: center;
            padding-bottom: 12px;
        }
        /* Иконка замка */
        .lock-icon {
            border: 1px solid #ffffff;
            width: 96px;
            height: 96px;
            background-color: #e4effb;
        }
        /* Лейблы */
        .label-cell {
            text-align: right;
            color: #1e395b;
            font-size: 11px;
            font-family: 'Segoe UI', 'Verdana', sans-serif;
        }
        .required-star {
            color: #ff0000;
            font-weight: bold;
            margin-right: 3px;
        }
        /* === ПОЛЯ ВВОДА (dxeTextBox_Office2010Blue) === */
        .dxeTextBox_Office2010Blue {
            background-color: #ffffff;
            border: 1px solid #8ba0bc;
            display: inline-block;
            padding: 0;
            width: 170px;
        }
        .dxeTextBox_Office2010Blue table {
            width: 100%;
        }
        .dxeEditArea_Office2010Blue {
            font: 11px 'Segoe UI', 'Verdana', sans-serif;
            border: none;
            background: #ffffff;
            width: 100%;
            padding: 3px 4px 2px 4px;
            margin: 0;
            outline: none;
            color: #000000;
        }
        .dxeEditArea_Office2010Blue:focus {
            /* эффект фокуса — синяя рамка */
            outline: 1px solid #6c86ad;
        }
        /* === КНОПКА (dxbButton_Office2010Blue) === */
        .dxbButton_Office2010Blue {
            color: #1e395b;
            font: normal 11px 'Segoe UI', 'Verdana', sans-serif;
            vertical-align: middle;
            border: 1px solid #abbad0;
            background: #d1dfef url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="1" height="24" viewBox="0 0 1 24"><rect width="1" height="24" fill="%23d1dfef"/><rect width="1" height="12" fill="%23ffffff" opacity="0.3"/></svg>') repeat-x left top;
            padding: 1px;
            cursor: pointer;
            width: 140px;
        }
        .dxbButton_Office2010Blue div {
            padding: 4px 0 3px 0;
            text-align: center;
            background: transparent;
        }
        .dxbButton_Office2010Blue:hover {
            background: #fcf8e5 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="1" height="24"><rect width="1" height="24" fill="%23fcf8e5"/><rect width="1" height="12" fill="%23ffffff" opacity="0.5"/></svg>') repeat-x left top;
            border: 1px solid #eecc53;
        }
        .dxbButton_Office2010Blue:active {
            background: #fee287 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="1" height="24"><rect width="1" height="24" fill="%23fee287"/><rect width="1" height="12" fill="%23f3d984" opacity="0.8"/></svg>') repeat-x left top;
            border: 1px solid #c2762b;
        }
        /* Сообщение об ошибке */
        .error-text {
            color: #ff0000;
            font-size: 11px;
            min-height: 18px;
            font-family: 'Segoe UI', 'Verdana', sans-serif;
        }
        /* Дополнительные отступы */
        .button-cell {
            padding-top: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="bg">
    <img src="img/logonui.jpg" alt="" />
</div>

<div id="content">
    <form name="loginForm" onsubmit="return false;">
        <table class="login-table" cellpadding="0" cellspacing="0">
            <tr>
                <td colspan="3" class="header-text">
                    Страница Авторизации
                </td>
            </tr>
            <tr>
                <td rowspan="3" style="padding-right: 16px;" align="right">
                    <img src="img/128logon.png" class="lock-icon" alt="" />
                </td>
                <td colspan="2">
                    <div id="errorMsg" class="error-text"></div>
                </td>
            </tr>
            <tr>
                <td class="label-cell">
                    <span class="required-star">*</span> Введите логин
                </td>
                <td>
                    <div class="dxeTextBox_Office2010Blue">
                        <table cellpadding="0" cellspacing="0" border="0">
                            <tr>
                                <td style="width:100%;">
                                    <input type="text" id="username" class="dxeEditArea_Office2010Blue" autocomplete="off" />
                                </td>
                            </tr>
                        </table>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="label-cell">
                    <span class="required-star">*</span> Введите пароль
                </td>
                <td>
                    <div class="dxeTextBox_Office2010Blue">
                        <table cellpadding="0" cellspacing="0" border="0">
                            <tr>
                                <td style="width:100%;">
                                    <input type="password" id="password" class="dxeEditArea_Office2010Blue" />
                                </td>
                            </tr>
                        </table>
                    </div>
                </td>
            </tr>
            <tr>
                <td colspan="3" class="button-cell">
                    <button type="button" id="loginBtn" class="dxbButton_Office2010Blue">
                        <div>Вход в систему</div>
                    </button>
                </td>
            </tr>
        </table>
    </form>
</div>

<script type="text/javascript">
    (function() {
        // === НАСТРОЙКИ ===
        var VALID_USER = 'admin';
        var VALID_PASS = 'meteo2024';
        var TARGET_PAGE = 'index.html';

        var userField = document.getElementById('username');
        var passField = document.getElementById('password');
        var loginBtn = document.getElementById('loginBtn');
        var errorDiv = document.getElementById('errorMsg');

        // Проверка, авторизован ли уже
        if (sessionStorage.getItem('auth') === 'ok') {
            window.location.href = TARGET_PAGE;
        }

        function doLogin() {
            var u = userField.value.replace(/^\s+|\s+$/g, '');
            var p = passField.value;
            
            if (u === VALID_USER && p === VALID_PASS) {
                sessionStorage.setItem('auth', 'ok');
                window.location.href = TARGET_PAGE;
            } else {
                errorDiv.innerHTML = 'Неверный логин или пароль';
                passField.value = '';
                passField.focus();
            }
        }

        loginBtn.onclick = doLogin;

        passField.onkeypress = function(e) {
            e = e || window.event;
            if (e.keyCode === 13) {
                doLogin();
            }
        };

        userField.onkeypress = function(e) {
            e = e || window.event;
            if (e.keyCode === 13) {
                passField.focus();
            }
        };

        userField.focus();
    })();
</script>

</body>
</html>
